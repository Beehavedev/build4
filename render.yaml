databases:
  - name: build4db
    plan: free
    databaseName: build4db
    user: build4

services:
  - type: web
    name: build4-telegram-bot
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate --schema=src/prisma/schema.prisma && npx vite build --config src/miniapp/vite.config.ts src/miniapp
    startCommand: npx tsx src/server.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: build4db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WALLET_ENCRYPTION_KEY
        sync: false
      - key: ASTER_BUILDER_ADDRESS
        sync: false
      - key: ASTER_AGENT_ADDRESS
        sync: false
      - key: ASTER_AGENT_PRIVATE_KEY
        sync: false
      - key: ASTER_BUILDER_FEE_RATE
        sync: false
      - key: MINIAPP_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
