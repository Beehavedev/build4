services:
  - type: web
    name: build4-telegram-bot
    runtime: node
    plan: starter
    buildCommand: npm install --ignore-scripts
    startCommand: npx tsx server/bot-server.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BSCSCAN_API_KEY
        sync: false
      - key: CHAOS_AGENT_PRIVATE_KEY
        sync: false
      - key: BANKR_API_KEY
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        generateValue: false
