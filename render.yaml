databases:
  - name: build4db
    plan: free
    databaseName: build4db
    user: build4

services:
  - type: web
    name: build4-telegram-bot
    runtime: node
    plan: starter
    # Pre-step: drop the legacy `Agent_walletAddress_key` unique index if it
    # exists. An older deploy created this index manually before the @unique
    # was added to the Prisma schema, so `db push` now collides with itself
    # ("relation already exists"). Dropping is safe — `db push` recreates it
    # immediately from the schema's @unique constraint.
    buildCommand: npm install && npx prisma generate --schema=src/_prisma_bot/schema.prisma && echo 'DROP INDEX IF EXISTS "Agent_walletAddress_key";' | npx prisma db execute --schema=src/_prisma_bot/schema.prisma --stdin && npx prisma db push --schema=src/_prisma_bot/schema.prisma --skip-generate --accept-data-loss && npx vite build --config src/miniapp/vite.config.ts src/miniapp
    # Re-run `prisma generate` on every start as a safety net: Render
    # sometimes serves a cached node_modules where the generated client is
    # stale (which is what happened when the new AgentLog columns
    # pair/adx/rsi/score/regime were added — the build's generate step
    # didn't actually replace node_modules/.prisma/client). Generate is
    # fast (~3-5s) and idempotent, so paying it on boot is worth it.
    startCommand: npx prisma generate --schema=src/_prisma_bot/schema.prisma && npx tsx src/server.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: build4db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # ── Multi-provider swarm (Task #18) ──────────────────────────────────
      # When at least 2 of (ANTHROPIC, XAI, HYPERBOLIC, AKASH) are set AND a
      # user has User.swarmEnabled=true, the trading agent runs every tick
      # across all live providers and uses the quorum verdict. On no-quorum,
      # the highest-confidence successful provider's decision wins (no extra
      # Anthropic call). Per-provider telemetry is persisted on
      # AgentLog.providers and OutcomePosition.providers (JSONB) and surfaced
      # via /predictions and /showcase. The legacy single-provider Anthropic
      # path remains the default — existing 17k+ users see no change.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: HYPERBOLIC_API_KEY
        sync: false
      - key: AKASH_API_KEY
        sync: false
      - key: WALLET_ENCRYPTION_KEY
        sync: false
      - key: ASTER_BUILDER_ADDRESS
        sync: false
      - key: ASTER_AGENT_ADDRESS
        sync: false
      - key: ASTER_AGENT_PRIVATE_KEY
        sync: false
      - key: ASTER_BUILDER_FEE_RATE
        sync: false
      - key: TWAK_ACCESS_ID
        sync: false
      - key: TWAK_HMAC_SECRET
        sync: false
      - key: TWAK_TRADING_INTEGRATION
        value: "false"
      - key: TWAK_RISK_THRESHOLD
        value: "7"
      - key: MINIAPP_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      # ── Swarm divergence watch (Task #25) ────────────────────────────────
      # Daily cron in src/agents/runner.ts runs the same analysis as
      # `tsx scripts/swarmDivergence.ts` and pings ADMIN_TELEGRAM_IDS via
      # the bot when any pair's no-quorum % crosses the threshold (with
      # enough sample). Set ADMIN_TELEGRAM_IDS to a comma-separated list
      # of admin Telegram user IDs to actually receive alerts.
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: SWARM_DIVERGENCE_DAYS
        value: "1"
      - key: SWARM_DIVERGENCE_THRESHOLD
        value: "50"
      - key: SWARM_DIVERGENCE_MIN_SAMPLE
        value: "20"
      # Standard cron — daily at 09:15 UTC. Override (e.g. '0 * * * *' for
      # hourly) by setting SWARM_DIVERGENCE_CRON.
      - key: SWARM_DIVERGENCE_CRON
        value: "15 9 * * *"
