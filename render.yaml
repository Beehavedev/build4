databases:
  - name: build4db
    plan: free
    databaseName: build4db
    user: build4

services:
  - type: web
    name: build4-telegram-bot
    runtime: node
    plan: starter
    # Pre-step: drop the legacy `Agent_walletAddress_key` unique index if it
    # exists. An older deploy created this index manually before the @unique
    # was added to the Prisma schema, so `db push` now collides with itself
    # ("relation already exists"). Dropping is safe — `db push` recreates it
    # immediately from the schema's @unique constraint.
    buildCommand: npm install && npx prisma generate --schema=src/prisma/schema.prisma && echo 'DROP INDEX IF EXISTS "Agent_walletAddress_key";' | npx prisma db execute --schema=src/prisma/schema.prisma --stdin && npx prisma db push --schema=src/prisma/schema.prisma --skip-generate --accept-data-loss && npx vite build --config src/miniapp/vite.config.ts src/miniapp
    # Re-run `prisma generate` on every start as a safety net: Render
    # sometimes serves a cached node_modules where the generated client is
    # stale (which is what happened when the new AgentLog columns
    # pair/adx/rsi/score/regime were added — the build's generate step
    # didn't actually replace node_modules/.prisma/client). Generate is
    # fast (~3-5s) and idempotent, so paying it on boot is worth it.
    startCommand: npx prisma generate --schema=src/prisma/schema.prisma && npx tsx src/server.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: build4db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # ── Multi-provider swarm (Task #18) ──────────────────────────────────
      # When at least 2 of (ANTHROPIC, XAI, HYPERBOLIC, AKASH) are set AND a
      # user has User.swarmEnabled=true, the trading agent runs every tick
      # across all live providers and uses the quorum verdict (falling back
      # to the Anthropic-only path on no-quorum). Per-provider telemetry is
      # persisted on AgentLog.providers and OutcomePosition.providers (JSONB)
      # and surfaced via the /predictions and /showcase commands. Default
      # behaviour for the existing 17k+ users is unchanged (flag off).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: HYPERBOLIC_API_KEY
        sync: false
      - key: AKASH_API_KEY
        sync: false
      - key: WALLET_ENCRYPTION_KEY
        sync: false
      - key: ASTER_BUILDER_ADDRESS
        sync: false
      - key: ASTER_AGENT_ADDRESS
        sync: false
      - key: ASTER_AGENT_PRIVATE_KEY
        sync: false
      - key: ASTER_BUILDER_FEE_RATE
        sync: false
      - key: TWAK_ACCESS_ID
        sync: false
      - key: TWAK_HMAC_SECRET
        sync: false
      - key: TWAK_TRADING_INTEGRATION
        value: "false"
      - key: TWAK_RISK_THRESHOLD
        value: "7"
      - key: MINIAPP_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
