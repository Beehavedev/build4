<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BUILD4 · House Agent</title>
<style>
  :root {
    --bg: #0d0e12;
    --bg-card: #16181f;
    --bg-elev: #1d2029;
    --border: #2a2d36;
    --text: #e8e9ec;
    --text-dim: #8a8e98;
    --purple: #7645d9;
    --green: #1cb46a;
    --red: #d04e4e;
    --amber: #e0a020;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px; min-height: 100vh;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 20px 16px 48px; }
  h1 { font-size: 22px; margin: 4px 0 18px; font-weight: 700; }
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-bottom: 12px;
  }
  .label {
    font-size: 11px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 1px; font-weight: 600;
  }
  .row { display: flex; gap: 8px; align-items: center; }
  .between { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid2-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  button {
    border: none; border-radius: 8px; cursor: pointer; font-weight: 600;
    font-size: 13px; padding: 10px 14px;
    background: var(--bg-elev); color: var(--text); transition: background .12s;
  }
  button:hover:not(:disabled) { background: #262a36; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: var(--purple); color: #fff; }
  button.green   { background: var(--green); color: #fff; }
  button.red     { background: var(--red); color: #fff; }
  button.gray    { background: #5a5a5a; color: #fff; }
  button.small   { padding: 6px 10px; font-size: 12px; }
  button.choice {
    text-align: left; padding: 10px 12px;
    border: 1px solid var(--border); background: transparent;
  }
  button.choice.active { border-color: var(--purple); background: rgba(118,69,217,0.12); }
  button.choice .t { font-weight: 600; font-size: 13px; display: block; }
  button.choice .d { font-size: 11px; color: var(--text-dim); margin-top: 2px; display: block; }
  input {
    background: var(--bg-elev); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; font-size: 13px; width: 100%;
  }
  input.mono { font-family: ui-monospace, monospace; }
  label.field { display: flex; flex-direction: column; font-size: 11px; color: var(--text-dim); gap: 4px; }
  .err {
    padding: 10px; border-radius: 8px; background: rgba(208,78,78,0.12);
    border: 1px solid rgba(208,78,78,0.4); color: #ffb4b4;
    font-size: 12px; margin-bottom: 12px;
  }
  .tag {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    background: var(--bg-elev); border: 1px solid var(--border);
    color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.5px; font-weight: 600;
  }
  .tag.purple { background: rgba(118,69,217,0.18); color: #c2a3ff; border-color: rgba(118,69,217,0.4); }
  .tag.green  { background: rgba(28,180,106,0.18); color: #7ee0a8; border-color: rgba(28,180,106,0.4); }
  .tag.red    { background: rgba(208,78,78,0.18); color: #ffb4b4; border-color: rgba(208,78,78,0.4); }
  .feed-row {
    padding: 8px; border-radius: 6px; background: var(--bg-elev);
    border: 1px solid var(--border); font-size: 11px; margin-bottom: 6px;
  }
  .feed-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  .pos-row {
    display: grid; grid-template-columns: 1.4fr 1.2fr 1fr auto;
    gap: 8px; align-items: center;
    padding: 10px; border-radius: 8px;
    background: var(--bg-elev); border: 1px solid var(--border);
    margin-bottom: 6px; font-size: 12px;
  }
  .pos-row .sym { font-weight: 700; font-size: 13px; }
  .pos-row .addr { font-size: 10px; color: var(--text-dim); }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
  @media (max-width: 600px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
  .stat .v { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .stat .l { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .venue-tab {
    padding: 6px 12px; font-size: 12px; border: 1px solid var(--border);
    border-radius: 6px; background: transparent; cursor: pointer;
  }
  .venue-tab.active { background: rgba(118,69,217,0.18); border-color: var(--purple); color: #c2a3ff; }
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .login-card { max-width: 360px; width: 100%; }
</style>
</head>
<body>
<div id="root"></div>
<script>
(() => {
  const TOKEN_KEY = "b4_house_admin_token";
  const $ = (id) => document.getElementById(id);
  const root = $("root");

  let state = null;
  let feed = [];
  let positions = [];
  let bnbBalance = null;
  let usdtBalance = null;
  let walletReady = false;
  let lastErr = null;
  let busy = false;
  let tradeBusy = false;
  let closeBusyToken = null;
  let tradeResult = null;
  let configDraft = {};
  // trade.slippage is in PERCENT (e.g. "1" = 1%)
  let trade = { side: "buy", token: "", amount: "0.01", slippage: "1", sellAll: false };
  let trackInput = "";
  let trackBusy = false;

  // Topaz state ────────────────────────────────────────────────────────
  // Topaz swap UX uses 18-decimal assumption for amount entry; the server
  // re-reads on-chain decimals so this is just for the UI default.
  let topazPositions = [];
  let topazSwap = { tokenIn: "0x55d398326f99059fF775485246999027B3197955", tokenOut: "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c", amountIn: "10", slippage: "1", stable: "" /* "" | "true" | "false" */ };
  let topazLp = { tokenA: "0x55d398326f99059fF775485246999027B3197955", tokenB: "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c", stable: false, amountA: "10", amountB: "0.05" };
  let topazBusy = false;
  let topazResult = null;
  let topazCloseBusy = null; // pair-or-tokenId currently closing

  function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }
  function setToken(t) {
    if (t) localStorage.setItem(TOKEN_KEY, t);
    else localStorage.removeItem(TOKEN_KEY);
  }

  async function api(path, init = {}) {
    const token = getToken();
    if (!token) throw new Error("not authenticated");
    const headers = Object.assign({ "x-admin-token": token }, init.headers || {});
    if (init.body && !headers["content-type"]) headers["content-type"] = "application/json";
    const r = await fetch(path, Object.assign({}, init, { headers }));
    const txt = await r.text();
    let json; try { json = txt ? JSON.parse(txt) : {}; } catch { json = { raw: txt }; }
    if (!r.ok) {
      if (r.status === 401 || r.status === 403) { setToken(""); render(); }
      throw new Error(json.error || json.message || (`HTTP ${r.status}`));
    }
    return json;
  }

  async function refresh() {
    try {
      const r = await api("/api/admin/house/state");
      state = r.state; feed = r.feed || [];
      positions = r.positions || [];
      bnbBalance = r.bnbBalance ?? null;
      usdtBalance = r.usdtBalance ?? null;
      walletReady = !!r.walletReady;
      configDraft = Object.assign({}, state.config || {}, configDraft);
      lastErr = null;
      // Topaz positions are cheap to refetch (single RPC enumeration)
      try {
        const tp = await api("/api/admin/house/topaz/positions");
        topazPositions = tp.positions || [];
      } catch (e) { /* not fatal — Topaz may be unconfigured */ }
    } catch (e) {
      lastErr = e.message || String(e);
      if (e.message === "not authenticated") state = null;
    }
    render();
  }

  async function sendTopazSwap() {
    topazBusy = true; topazResult = null; lastErr = null; render();
    try {
      const slippagePct = parseFloat(topazSwap.slippage);
      if (!isFinite(slippagePct) || slippagePct <= 0) throw new Error("Slippage must be positive");
      const body = {
        tokenIn:  topazSwap.tokenIn.trim(),
        tokenOut: topazSwap.tokenOut.trim(),
        amountIn: topazSwap.amountIn.trim(),
        slippagePct,
      };
      if (topazSwap.stable === "true")  body.stable = true;
      if (topazSwap.stable === "false") body.stable = false;
      const r = await api("/api/admin/house/topaz/swap", { method: "POST", body: JSON.stringify(body) });
      const d = r.details || {};
      topazResult = `✓ SWAP · ${d.amountIn} ${d.tokenIn?.slice(0,10)}… → ${d.tokenOut?.slice(0,10)}… (${d.stable ? 'stable' : 'volatile'}) · tx ${r.txHash || '—'}`;
      await refresh();
    } catch (e) {
      topazResult = "✗ " + (e.message || String(e));
    } finally {
      topazBusy = false; render();
    }
  }

  async function sendTopazLp() {
    topazBusy = true; topazResult = null; lastErr = null; render();
    try {
      const body = {
        tokenA: topazLp.tokenA.trim(),
        tokenB: topazLp.tokenB.trim(),
        stable: !!topazLp.stable,
        amountADesired: topazLp.amountA.trim(),
        amountBDesired: topazLp.amountB.trim(),
      };
      const r = await api("/api/admin/house/topaz/lp", { method: "POST", body: JSON.stringify(body) });
      topazResult = `✓ OPEN_LP · minted ${r.lpAmount} LP · staked=${r.staked ? 'yes' : 'no'} · tx ${r.txHash || '—'}`;
      await refresh();
    } catch (e) {
      topazResult = "✗ " + (e.message || String(e));
    } finally {
      topazBusy = false; render();
    }
  }

  async function closeTopazPosition(p) {
    const key = p.positionType === 'v3-nft' ? p.tokenId : p.poolAddress;
    if (!confirm(`Close Topaz ${p.positionType} ${key}?`)) return;
    topazCloseBusy = key; lastErr = null; render();
    try {
      const body = p.positionType === 'v3-nft'
        ? { positionType: 'v3-nft', tokenId: p.tokenId }
        : { positionType: 'v2-lp', tokenA: p.tokenA, tokenB: p.tokenB, stable: !!p.stable, pair: p.poolAddress, gauge: p.gauge };
      const r = await api("/api/admin/house/topaz/close", { method: "POST", body: JSON.stringify(body) });
      topazResult = `✓ CLOSED · tx ${r.closeTx || r.unstakeTx || '—'}`;
      await refresh();
    } catch (e) {
      topazResult = "✗ Close failed: " + (e.message || String(e));
    } finally {
      topazCloseBusy = null; render();
    }
  }

  async function patch(body) {
    busy = true; render();
    try {
      await api("/api/admin/house/config", { method: "POST", body: JSON.stringify(body) });
      await refresh();
    } catch (e) { lastErr = e.message; render(); }
    finally { busy = false; }
  }

  function fmt(n, max = 6) {
    if (n == null) return "—";
    const x = Number(n);
    if (!isFinite(x)) return String(n);
    if (x === 0) return "0";
    if (x < 0.0001) return x.toExponential(2);
    return x.toLocaleString(undefined, { maximumFractionDigits: max });
  }

  async function sendTrade() {
    tradeBusy = true; tradeResult = null; lastErr = null; render();
    try {
      const slippagePct = parseFloat(trade.slippage);
      if (!isFinite(slippagePct) || slippagePct <= 0) throw new Error("Slippage must be a positive number (e.g. 1 for 1%)");
      const body = {
        dex: "pancake",
        side: trade.side,
        tokenAddress: trade.token.trim(),
        slippagePct,
      };
      if (trade.side === "sell" && trade.sellAll) {
        body.sellAll = true;
      } else {
        body.amount = trade.amount.trim();
      }
      const r = await api("/api/admin/house/trade", { method: "POST", body: JSON.stringify(body) });
      const d = r.details || {};
      const summary = trade.side === "buy"
        ? `BUY · spent ${d.bnbSpent || trade.amount} BNB`
        : `SELL · sold ${d.tokensSold || ""} ${d.symbol || ""} → ~${fmt(d.estBnbReceived)} BNB`;
      tradeResult = "✓ " + summary + "  ·  tx " + r.txHash;
      await refresh();
    } catch (e) {
      tradeResult = "✗ " + (e.message || String(e));
    } finally {
      tradeBusy = false; render();
    }
  }

  async function closePosition(tokenAddress, symbol) {
    if (!confirm(`Sell ALL ${symbol} for BNB?`)) return;
    closeBusyToken = tokenAddress; lastErr = null; render();
    try {
      const slippagePct = parseFloat(trade.slippage) || 1;
      const r = await api("/api/admin/house/close", {
        method: "POST",
        body: JSON.stringify({ tokenAddress, slippagePct }),
      });
      const d = r.details || {};
      tradeResult = `✓ CLOSED ${symbol} · ~${fmt(d.estBnbReceived)} BNB · tx ${r.txHash}`;
      await refresh();
    } catch (e) {
      tradeResult = "✗ Close failed: " + (e.message || String(e));
    } finally {
      closeBusyToken = null; render();
    }
  }

  function attemptLogin(token) {
    setToken(token);
    state = null; lastErr = null;
    refresh();
  }

  const esc = (s) => String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");

  function loginView() {
    return `
      <div class="login-wrap">
        <div class="card login-card">
          <h1 style="margin-top:0">🏛 House Agent</h1>
          <div class="label" style="margin-bottom:6px">Admin token</div>
          <input id="login-token" type="password" placeholder="ADMIN_TOKEN" autocomplete="off" />
          ${lastErr ? `<div class="err" style="margin-top:10px">${esc(lastErr)}</div>` : ""}
          <button class="primary" id="login-btn" style="width:100%; margin-top:12px">Unlock</button>
          <div style="font-size:11px;color:var(--text-dim);margin-top:10px;line-height:1.5">
            Standalone admin panel. Token is the server's ADMIN_TOKEN secret. Stored in this browser only.
          </div>
        </div>
      </div>`;
  }

  function modeBtn(id, label, desc) {
    const active = state.mode === id;
    return `<button class="choice ${active ? "active" : ""}" data-mode="${id}" ${busy ? "disabled" : ""}>
      <span class="t">${label}</span><span class="d">${desc}</span>
    </button>`;
  }
  function dexBtn(id, label, ready) {
    const active = state.dex === id;
    return `<button class="choice ${active ? "active" : ""}" data-dex="${id}"
        ${busy || !ready ? "disabled" : ""} style="${!ready ? "opacity:.5" : ""}">
      <span class="t">${label}${ready ? "" : " (soon)"}</span>
    </button>`;
  }

  function positionRow(p) {
    const busyThis = closeBusyToken === p.tokenAddress;
    return `<div class="pos-row">
      <div>
        <div class="sym">${esc(p.symbol)} <span class="tag">${esc(p.venue)}</span></div>
        <div class="addr mono">${esc(p.tokenAddress)}</div>
      </div>
      <div>
        <div class="label" style="font-size:9px">Held</div>
        <div class="mono">${fmt(p.balance)}</div>
      </div>
      <div>
        <div class="label" style="font-size:9px">Est. value</div>
        <div class="mono">${p.quoteError ? `<span style="color:#ffb4b4">no quote</span>` : `~${fmt(p.estBnbValue)} BNB`}</div>
      </div>
      <button class="red small" data-close="${esc(p.tokenAddress)}" data-sym="${esc(p.symbol)}" ${busyThis ? "disabled" : ""}>
        ${busyThis ? "Closing…" : "CLOSE"}
      </button>
    </div>`;
  }

  function feedRow(r) {
    return `<div class="feed-row">
      <div class="feed-meta">
        <span class="mono" style="color:var(--text-dim)">${esc(new Date(r.createdAt).toLocaleTimeString())}</span>
        ${r.dex ? `<span class="tag">${esc(r.dex)}</span>` : ""}
        <span class="tag">${esc(r.kind)}</span>
        ${r.decision ? `<span class="tag ${r.decision === 'FILLED' ? 'green' : r.decision === 'SELL' ? 'red' : 'purple'}">${esc(r.decision)}</span>` : ""}
      </div>
      <div>${esc(r.reasoning)}</div>
      ${r.txHash ? `<div class="mono" style="font-size:10px;color:var(--text-dim);margin-top:4px;word-break:break-all">tx ${esc(r.txHash)}</div>` : ""}
    </div>`;
  }

  function panelView() {
    if (!state) {
      return `<div class="wrap">${lastErr ? `<div class="err">${esc(lastErr)}</div>` : "Loading…"}</div>`;
    }
    const cfg = configDraft;
    const numField = (label, key, step, hint) => `
      <label class="field">${label}${hint ? ` <span style="color:var(--text-dim);font-size:10px">· ${hint}</span>` : ""}
        <input type="number" step="${step}" data-cfg="${key}"
               value="${cfg[key] == null ? "" : esc(cfg[key])}" class="mono" />
      </label>`;

    // Pancake-only sell hint
    const pcsPositions = positions.filter(p => p.venue === 'pancake');
    const otherVenues = ['aster', 'hyperliquid', '42', 'polymarket'];

    return `
      <div class="wrap">
        <div class="between" style="margin-bottom:10px">
          <h1 style="margin:0">🏛 House Agent</h1>
          <button id="logout" style="font-size:11px;padding:6px 10px">Lock</button>
        </div>
        ${lastErr ? `<div class="err">${esc(lastErr)}</div>` : ""}

        <section class="card">
          <div class="between">
            <div style="min-width:0;flex:1">
              <div class="label">Wallet (BSC)</div>
              <div class="mono" style="margin-top:2px;word-break:break-all;font-size:12px">${esc(state.walletAddress || "—")}</div>
              ${!walletReady ? `<div style="font-size:11px;color:#ffb4b4;margin-top:4px">⚠ HOUSE_AGENT_PRIVATE_KEY not set on server</div>` : ""}
            </div>
            <button id="toggle" class="${state.enabled ? "green" : "gray"}" ${busy || !walletReady ? "disabled" : ""}>
              ${state.enabled ? "ENABLED" : "DISABLED"}
            </button>
          </div>
          <div class="stat-grid">
            <div class="stat">
              <div class="l">BNB balance</div>
              <div class="v mono">${fmt(bnbBalance, 5)}</div>
            </div>
            <div class="stat">
              <div class="l">USDT balance</div>
              <div class="v mono">${fmt(usdtBalance, 2)}</div>
            </div>
            <div class="stat">
              <div class="l">Open positions</div>
              <div class="v mono">${positions.length}</div>
            </div>
            <div class="stat">
              <div class="l">Mode</div>
              <div class="v" style="font-size:14px;text-transform:uppercase">${esc(state.mode)}</div>
            </div>
          </div>
          <div style="margin-top:10px;font-size:11px;color:var(--text-dim)">
            Last tick: ${state.lastTickAt ? esc(new Date(state.lastTickAt).toLocaleString()) : "never"}
            ${state.lastTickStatus ? " · " + esc(state.lastTickStatus) : ""}
          </div>
        </section>

        <section class="card">
          <div class="label">Open positions</div>
          <div style="margin:8px 0 6px;display:flex;gap:6px;flex-wrap:wrap">
            <span class="venue-tab active">PancakeSwap (${pcsPositions.length})</span>
            ${otherVenues.map(v => `<span class="venue-tab" title="not wired yet" style="opacity:.5">${v} (soon)</span>`).join("")}
          </div>
          ${pcsPositions.length === 0
            ? `<div style="font-size:12px;color:var(--text-dim);padding:8px 0">No open Pancake positions tracked. Use "Track token" below if you bought one before the panel existed.</div>`
            : pcsPositions.map(positionRow).join("")}
          <div style="display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
            <input type="text" id="track-input" class="mono" placeholder="0x… token address to track" value="${esc(trackInput)}" />
            <button class="primary small" id="track-btn" ${trackBusy || !trackInput ? "disabled" : ""}>
              ${trackBusy ? "…" : "Track"}
            </button>
          </div>
        </section>

        <section class="card">
          <div class="label">Mode</div>
          <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">
            ${modeBtn("idle", "Idle", "No trades fire. Safe parked state.")}
            ${modeBtn("autotrade", "Autotrade", "Continuous AI trading between campaigns.")}
            ${modeBtn("campaign", "Campaign", "Hand control to a scheduled campaign brain.")}
          </div>
        </section>

        <section class="card">
          <div class="label">DEX</div>
          <div class="grid2-stack" style="margin-top:8px">
            ${dexBtn("pancake", "PancakeSwap (BSC)", true)}
            ${dexBtn("42", "42.space", true)}
            ${dexBtn("topaz", "Topaz (BSC ve3,3)", true)}
            ${dexBtn("aster", "Aster DEX", false)}
            ${dexBtn("hyperliquid", "Hyperliquid L1", false)}
          </div>
        </section>

        <section class="card">
          <div class="label">Trading config</div>
          <div class="grid2" style="margin-top:8px">
            ${numField("Size (BNB)", "sizeBnb", "0.001", "default trade size")}
            ${numField("Slippage (bps)", "slippageBps", "10", "stored as bps · 100 = 1%")}
            ${numField("Max open positions", "maxOpenPositions", "1")}
            ${numField("Max trades / hour", "maxTradesPerHour", "1")}
          </div>
          <button class="primary" id="save-cfg" style="margin-top:12px" ${busy ? "disabled" : ""}>Save config</button>
        </section>

        <section class="card">
          <div class="label">Manual trade · PancakeSwap</div>
          <div style="display:flex;gap:6px;margin:10px 0">
            <button class="${trade.side === "buy" ? "green" : "choice"}" data-side="buy" style="flex:1">BUY</button>
            <button class="${trade.side === "sell" ? "red" : "choice"}" data-side="sell" style="flex:1">SELL</button>
          </div>
          <label class="field">Token address (0x…)
            <input type="text" id="tr-token" class="mono" value="${esc(trade.token)}" placeholder="0x…" />
          </label>
          ${trade.side === "sell" ? `
            <div style="margin-top:8px">
              <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)">
                <input type="checkbox" id="tr-sellall" ${trade.sellAll ? "checked" : ""} style="width:auto;margin:0" />
                Sell ALL my balance of this token
              </label>
            </div>
          ` : ""}
          <div class="grid2" style="margin-top:8px">
            <label class="field">${trade.side === "buy" ? "BNB to spend" : "Token amount"}
              <input type="text" id="tr-amount" class="mono"
                     value="${esc(trade.amount)}"
                     placeholder="${trade.side === "buy" ? "0.05" : "1234.5"}"
                     ${trade.side === "sell" && trade.sellAll ? "disabled" : ""} />
            </label>
            <label class="field">Slippage (%)
              <input type="text" id="tr-slip" class="mono" value="${esc(trade.slippage)}" placeholder="1" />
            </label>
          </div>
          <button class="${trade.side === "buy" ? "green" : "red"}" id="send-trade"
                  style="margin-top:12px;width:100%"
                  ${tradeBusy || !trade.token || (trade.side === "buy" && !trade.amount) || (trade.side === "sell" && !trade.sellAll && !trade.amount) ? "disabled" : ""}>
            ${tradeBusy ? "Sending…" : "Send " + trade.side.toUpperCase()}
          </button>
          ${tradeResult ? `<div class="mono" style="margin-top:10px;font-size:11px;word-break:break-all;color:${tradeResult.startsWith("✓") ? "var(--green)" : "#ffb4b4"}">${esc(tradeResult)}</div>` : ""}
        </section>

        <section class="card">
          <div class="label">Topaz DEX (BSC ve3,3) · positions (${topazPositions.length})</div>
          ${topazPositions.length === 0
            ? `<div style="font-size:12px;color:var(--text-dim);padding:8px 0">No open Topaz positions. Open one with the LP form below.</div>`
            : `<div style="margin-top:8px">${topazPositions.map(p => `
                <div class="pos-row">
                  <div>
                    <div class="sym">${p.positionType === 'v3-nft' ? `v3 NFT #${esc(p.tokenId)}` : `v2 LP ${p.stable ? 'stable' : 'volatile'}`} <span class="tag">topaz</span></div>
                    <div class="addr mono">${esc(p.tokenA || '')}<br>${esc(p.tokenB || '')}</div>
                  </div>
                  <div>
                    <div class="label" style="font-size:9px">Pool / pair</div>
                    <div class="mono" style="font-size:10px;word-break:break-all">${esc(p.poolAddress)}</div>
                  </div>
                  <div>
                    <div class="label" style="font-size:9px">${p.positionType === 'v3-nft' ? 'liquidity' : 'LP amount'}</div>
                    <div class="mono">${esc(p.lpAmount || p.liquidity || '—')}</div>
                  </div>
                  <button class="red small" data-topaz-close="${esc(p.positionType === 'v3-nft' ? p.tokenId : p.poolAddress)}" ${topazCloseBusy === (p.positionType === 'v3-nft' ? p.tokenId : p.poolAddress) ? "disabled" : ""}>
                    ${topazCloseBusy === (p.positionType === 'v3-nft' ? p.tokenId : p.poolAddress) ? "Closing…" : "CLOSE"}
                  </button>
                </div>`).join("")}</div>`}
          ${topazResult ? `<div class="mono" style="margin-top:10px;font-size:11px;word-break:break-all;color:${topazResult.startsWith("✓") ? "var(--green)" : "#ffb4b4"}">${esc(topazResult)}</div>` : ""}
        </section>

        <section class="card">
          <div class="label">Manual swap · Topaz</div>
          <div style="font-size:11px;color:var(--text-dim);margin:4px 0 10px">Pre-filled: USDT → WBNB. Auto-detects volatile/stable pool unless forced below.</div>
          <label class="field">Token IN
            <input type="text" id="tz-tin" class="mono" value="${esc(topazSwap.tokenIn)}" placeholder="0x…" />
          </label>
          <label class="field" style="margin-top:8px">Token OUT
            <input type="text" id="tz-tout" class="mono" value="${esc(topazSwap.tokenOut)}" placeholder="0x…" />
          </label>
          <div class="grid2" style="margin-top:8px">
            <label class="field">Amount IN (decimal)
              <input type="text" id="tz-amt" class="mono" value="${esc(topazSwap.amountIn)}" placeholder="10" />
            </label>
            <label class="field">Slippage (%)
              <input type="text" id="tz-slip" class="mono" value="${esc(topazSwap.slippage)}" placeholder="1" />
            </label>
          </div>
          <label class="field" style="margin-top:8px">Pool type
            <select id="tz-stable" class="mono">
              <option value=""      ${topazSwap.stable === ""      ? "selected" : ""}>auto (try volatile then stable)</option>
              <option value="false" ${topazSwap.stable === "false" ? "selected" : ""}>force volatile (xy=k)</option>
              <option value="true"  ${topazSwap.stable === "true"  ? "selected" : ""}>force stable (x³y+xy³)</option>
            </select>
          </label>
          <button class="primary" id="tz-send-swap" style="margin-top:12px;width:100%" ${topazBusy ? "disabled" : ""}>
            ${topazBusy ? "Sending…" : "Send Topaz SWAP"}
          </button>
        </section>

        <section class="card">
          <div class="label">Open LP position · Topaz v2</div>
          <div style="font-size:11px;color:var(--text-dim);margin:4px 0 10px">Provides liquidity 50/50 and auto-stakes the minted LP in the pool's gauge (if one exists) to earn TOPAZ emissions + trading fees.</div>
          <label class="field">Token A
            <input type="text" id="tz-lp-ta" class="mono" value="${esc(topazLp.tokenA)}" placeholder="0x…" />
          </label>
          <label class="field" style="margin-top:8px">Token B
            <input type="text" id="tz-lp-tb" class="mono" value="${esc(topazLp.tokenB)}" placeholder="0x…" />
          </label>
          <div class="grid2" style="margin-top:8px">
            <label class="field">Amount A (decimal)
              <input type="text" id="tz-lp-amta" class="mono" value="${esc(topazLp.amountA)}" placeholder="10" />
            </label>
            <label class="field">Amount B (decimal)
              <input type="text" id="tz-lp-amtb" class="mono" value="${esc(topazLp.amountB)}" placeholder="0.05" />
            </label>
          </div>
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);margin-top:10px">
            <input type="checkbox" id="tz-lp-stable" ${topazLp.stable ? "checked" : ""} style="width:auto;margin:0" />
            Stable pool (x³y+xy³ — same-class assets like USDT/USDC)
          </label>
          <button class="primary" id="tz-send-lp" style="margin-top:12px;width:100%" ${topazBusy ? "disabled" : ""}>
            ${topazBusy ? "Sending…" : "Open Topaz LP"}
          </button>
        </section>

        <section class="card">
          <div class="label">Brain feed · last ${feed.length}</div>
          ${feed.length === 0
            ? `<div style="font-size:12px;color:var(--text-dim);margin-top:8px">No activity yet.</div>`
            : `<div style="margin-top:8px">${feed.map(feedRow).join("")}</div>`}
        </section>
      </div>`;
  }

  function render() {
    if (!getToken()) {
      root.innerHTML = loginView();
      const btn = $("login-btn"), tok = $("login-token");
      btn.onclick = () => { if (tok.value) attemptLogin(tok.value); };
      tok.addEventListener("keydown", (e) => { if (e.key === "Enter" && tok.value) attemptLogin(tok.value); });
      tok.focus();
      return;
    }
    root.innerHTML = panelView();

    const logout = $("logout"); if (logout) logout.onclick = () => { setToken(""); render(); };
    const tgl = $("toggle"); if (tgl) tgl.onclick = () => patch({ enabled: !state.enabled });

    document.querySelectorAll("[data-mode]").forEach(b => {
      b.onclick = () => patch({ mode: b.dataset.mode });
    });
    document.querySelectorAll("[data-dex]").forEach(b => {
      b.onclick = () => patch({ dex: b.dataset.dex });
    });

    document.querySelectorAll("[data-cfg]").forEach(inp => {
      inp.oninput = () => {
        const v = inp.value;
        configDraft[inp.dataset.cfg] = v === "" ? undefined : Number(v);
      };
    });
    const save = $("save-cfg"); if (save) save.onclick = () => patch({ config: configDraft });

    document.querySelectorAll("[data-side]").forEach(b => {
      b.onclick = () => {
        trade.side = b.dataset.side;
        if (trade.side === "buy") { trade.sellAll = false; trade.amount = trade.amount || "0.01"; }
        render();
      };
    });
    const sa = $("tr-sellall");
    if (sa) sa.onchange = () => { trade.sellAll = sa.checked; render(); };

    const tt = $("tr-token"); if (tt) tt.oninput = () => { trade.token = tt.value; updateTradeBtn(); };
    const ta = $("tr-amount"); if (ta) ta.oninput = () => { trade.amount = ta.value; updateTradeBtn(); };
    const ts = $("tr-slip"); if (ts) ts.oninput = () => { trade.slippage = ts.value; };
    const sb = $("send-trade"); if (sb) sb.onclick = sendTrade;

    document.querySelectorAll("[data-close]").forEach(b => {
      b.onclick = () => closePosition(b.dataset.close, b.dataset.sym);
    });

    // Topaz handlers
    const tzTin  = $("tz-tin");  if (tzTin)  tzTin.oninput  = () => { topazSwap.tokenIn  = tzTin.value;  };
    const tzTout = $("tz-tout"); if (tzTout) tzTout.oninput = () => { topazSwap.tokenOut = tzTout.value; };
    const tzAmt  = $("tz-amt");  if (tzAmt)  tzAmt.oninput  = () => { topazSwap.amountIn = tzAmt.value;  };
    const tzSlip = $("tz-slip"); if (tzSlip) tzSlip.oninput = () => { topazSwap.slippage = tzSlip.value; };
    const tzSt   = $("tz-stable"); if (tzSt) tzSt.onchange  = () => { topazSwap.stable   = tzSt.value;   };
    const tzSendSwap = $("tz-send-swap"); if (tzSendSwap) tzSendSwap.onclick = sendTopazSwap;
    const tzLpTa = $("tz-lp-ta");  if (tzLpTa) tzLpTa.oninput = () => { topazLp.tokenA  = tzLpTa.value; };
    const tzLpTb = $("tz-lp-tb");  if (tzLpTb) tzLpTb.oninput = () => { topazLp.tokenB  = tzLpTb.value; };
    const tzLpA  = $("tz-lp-amta"); if (tzLpA) tzLpA.oninput  = () => { topazLp.amountA = tzLpA.value; };
    const tzLpB  = $("tz-lp-amtb"); if (tzLpB) tzLpB.oninput  = () => { topazLp.amountB = tzLpB.value; };
    const tzLpSt = $("tz-lp-stable"); if (tzLpSt) tzLpSt.onchange = () => { topazLp.stable = tzLpSt.checked; };
    const tzSendLp = $("tz-send-lp"); if (tzSendLp) tzSendLp.onclick = sendTopazLp;
    document.querySelectorAll("[data-topaz-close]").forEach(b => {
      b.onclick = () => {
        const key = b.dataset.topazClose;
        const p = topazPositions.find(x => (x.positionType === 'v3-nft' ? x.tokenId : x.poolAddress) === key);
        if (p) closeTopazPosition(p);
      };
    });

    const ti = $("track-input");
    if (ti) ti.oninput = () => {
      trackInput = ti.value;
      const tb = $("track-btn"); if (tb) tb.disabled = trackBusy || !trackInput;
    };
    const tb = $("track-btn");
    if (tb) tb.onclick = async () => {
      if (!trackInput) return;
      trackBusy = true; render();
      try {
        await api("/api/admin/house/track", { method: "POST", body: JSON.stringify({ tokenAddress: trackInput.trim() }) });
        trackInput = "";
        await refresh();
      } catch (e) {
        lastErr = e.message || String(e);
      } finally {
        trackBusy = false; render();
      }
    };
  }

  function updateTradeBtn() {
    const b = $("send-trade");
    if (!b) return;
    const ok = trade.token && (
      (trade.side === "buy" && trade.amount) ||
      (trade.side === "sell" && (trade.sellAll || trade.amount))
    );
    b.disabled = tradeBusy || !ok;
  }

  render();
  if (getToken()) refresh();
  setInterval(() => { if (getToken() && state) refresh(); }, 5000);
})();
</script>
</body>
</html>
